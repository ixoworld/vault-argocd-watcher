apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vault-argocd-watcher.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vault-argocd-watcher.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "vault-argocd-watcher.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: {{ include "vault-argocd-watcher.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.addr | quote }}
            - name: VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: VAULT_MOUNT
              value: {{ .Values.vault.mount | quote }}
            - name: ARGO_NAMESPACE
              value: {{ .Values.argocd.namespace | quote }}
            - name: WATCHED_APPS
              value: {{ .Values.watchedApps | join "," | quote }}
            - name: POLL_INTERVAL
              value: {{ .Values.vault.pollInterval | quote }}
