version: "2"

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - gofmt
    - goimports
    - errorlint
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/ixofoundation/vault-argocd-watcher
  gosec:
    severity: medium

issues:
  exclude-use-default: false
