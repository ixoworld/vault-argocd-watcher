version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - gofmt
    - goimports
    - errorlint
    - noctx
  settings:
    goimports:
      local-prefixes: github.com/ixofoundation/vault-argocd-watcher
    gosec:
      severity: medium
  exclusions:
    presets:
      - common-false-positives
